version: 2
updates:
- package-ecosystem: uv
  directory: "./pydatalab"
  schedule:
    interval: monthly
    day: monday
    time: "05:43"
  target-branch: main
  labels:
  - dependency_updates
  - Python
  versioning-strategy: "increase-if-necessary"
  groups:
    python-production:
      applies-to: version-updates
      dependency-type: production
      update-types:
        - minor
        - patch
    python-development:
      applies-to: version-updates
      dependency-type: development
      update-types:
        - minor
        - patch
  ignore:
    - dependency-name: "pydantic"
      versions: [ ">=2" ]
    - dependency-name: "bokeh"
      versions: [ ">=3" ]
    - dependency-name: "langchain"
      versions: [ ">=0.3" ]
# Updates GH actions versions as often as needed
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    day: monday
    interval: monthly
    time: "05:33"
  target-branch: main
  labels:
  - dependency_updates
  - CI
  groups:
    github-actions:
      applies-to: version-updates
      dependency-type: production
- package-ecosystem: npm
  directory: "./webapp"
  schedule:
    day: monday
    interval: monthly
    time: "05:33"
  target-branch: main
  labels:
  - dependency_updates
  - javascript
  groups:
    js-production:
      applies-to: version-updates
      dependency-type: production
      update-types:
        - minor
        - patch
    js-development:
      applies-to: version-updates
      dependency-type: development
      update-types:
        - minor
        - patch
- package-ecosystem: docker
  directories:
    - ".docker/app"
    - ".docker/server"
    - ".docker/mongo"
  schedule:
    day: monday
    interval: monthly
    time: "05:33"
  target-branch: main
  labels:
  - dependency_updates
  - build
